<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Primary Tags -->
    <title>Carsena | Fotografia Editorial e de Luxo</title>
    <meta name="title" content="Carsena | Fotografia Editorial e de Luxo" />
    <meta name="description" content="Especialista em capturar momentos atemporais com um olhar editorial. Fotografia de luxo para casamentos, moda e ensaios exclusivos." />
    <meta name="keywords" content="fotógrafo de luxo, fotografia editorial, casamentos premium, ensaios fotográficos, carsena photo, fotógrafo recife, arte fotográfica" />
    <meta name="author" content="Carsena Photo" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://carsena.com.br/" />
    <meta property="og:title" content="Carsena | Fotografia Editorial e de Luxo" />
    <meta property="og:description" content="Capturando a essência de momentos únicos com sofisticação e olhar documental." />
    <meta property="og:image" content="https://carsena.com.br/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://carsena.com.br/" />
    <meta property="twitter:title" content="Carsena | Fotografia Editorial e de Luxo" />
    <meta property="twitter:description" content="Capturando a essência de momentos únicos com sofisticação e olhar documental." />
    <meta property="twitter:image" content="https://carsena.com.br/og-image.jpg" />

    <!-- Favicon (v=3 to burst cache) -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=3">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=3">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=3">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=3">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#0a0a0a">

    <!-- Structured Data JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "PhotographyBusiness",
      "name": "Carsena Photo",
      "url": "https://carsena.com.br",
      "description": "Estúdio boutique de fotografia especializada em ensaios editoriais, moda e casamentos de luxo.",
      "image": "https://carsena.com.br/og-image.jpg",
      "priceRange": "$$$",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Recife",
        "addressRegion": "PE",
        "addressCountry": "BR"
      }
    }
    </script>

    <!-- Preconnect for better performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
